name: Rust (Arch)

on:
  push:
    branches: [main, development/beta]
  pull_request:
    branches: [main, development/beta]

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_RETRY: 5
  CARGO_HTTP_TIMEOUT: 120

jobs:
  build:
    runs-on: ubuntu-24.04
    container:
      image: archlinux:base

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Cache Cargo dependencies and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock', 'Cargo.toml', 'build.rs', 'data/ui/*.blp') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Update Arch Linux and install dependencies
        run: |
          pacman -Syu --noconfirm --needed \
            base-devel \
            git \
            meson \
            ninja \
            pkgconf \
            gtk4 \
            libadwaita \
            glib2 \
            desktop-file-utils \
            gettext \
            libxml2 \
            blueprint-compiler \
            rustup

      - name: Initialize stable Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustc --version
          cargo --version

      - name: Validate Meson configuration
        run: meson setup build-ci --buildtype=release

      - name: Validate Blueprint interfaces
        run: |
          blueprint-compiler --version
          mkdir -p build-blueprints
          for blueprint in data/ui/*.blp; do
            blueprint-compiler lint "$blueprint"
            output="build-blueprints/$(basename "${blueprint%.blp}").ui"
            blueprint-compiler compile --output "$output" "$blueprint"
            xmllint --noout "$output"
          done

      - name: Validate project metadata and scripts
        run: |
          for catalog in po/*.po; do
            msgfmt --check --check-format -o /tmp/catalog.mo "$catalog"
          done
          python3 -m json.tool io.github.PkgbuildManage.json >/dev/null
          desktop-file-validate \
            data/applications/io.github.PkgbuildManage.desktop \
            data/applications/pkgbuild-manager-settings.desktop
          xmllint --noout \
            data/icons/hicolor/scalable/apps/io.github.PkgbuildManage.svg \
            data/icons/hicolor/symbolic/apps/io.github.PkgbuildManage-symbolic.svg
          bash -n pkgbuild-manager.install
          bash -n data/nautilus-scripts/_i18n

      - name: Build with Cargo
        env:
          PKG_CONFIG_PATH: /usr/lib/pkgconfig:/usr/share/pkgconfig
          LD_LIBRARY_PATH: /usr/lib
        run: cargo build --release --locked

      - name: Verify Blueprint-backed GUI target
        run: cargo check --bin pkgbuild-manager-gui --release --locked

      - name: Run tests
        run: cargo test --locked
